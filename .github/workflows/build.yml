name: Excel Audit Build Binaries

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Build EXE with PyInstaller
        run: uv run pyinstaller --noconsole --onefile --name "ExcelAudit_Windows" app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelAudit-Windows-Binary
          path: dist/ExcelAudit_Windows.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Build Linux Binary
        run: uv run pyinstaller --noconsole --onefile --name "ExcelAudit_Linux" app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelAudit-Linux-Binary
          path: dist/ExcelAudit_Linux
